<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E879F9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="#06162b" />
  
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-opacity="0.3" />
  
  <path d="M50 25 L75 65 L25 65 Z" fill="none" stroke="url(#grad1)" stroke-width="4" stroke-linejoin="round" filter="url(#glow)"/>
  
  <circle cx="50" cy="25" r="6" fill="#22D3EE" filter="url(#glow)"/>
  <circle cx="75" cy="65" r="6" fill="#E879F9" filter="url(#glow)"/>
  <circle cx="25" cy="65" r="6" fill="#22D3EE" filter="url(#glow)"/>
  <circle cx="50" cy="55" r="4" fill="#FFFFFF" filter="url(#glow)"/>
  
  <line x1="50" y1="25" x2="50" y2="55" stroke="url(#grad1)" stroke-width="2" />
  <line x1="75" y1="65" x2="50" y2="55" stroke="url(#grad1)" stroke-width="2" />
  <line x1="25" y1="65" x2="50" y2="55" stroke="url(#grad1)" stroke-width="2" />
</svg>
