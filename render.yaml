databases:
  - name: project-mngt-db
    databaseName: cellforge
    user: cellforge_user
    plan: free

services:
  - type: web
    name: cellthena-cellforge-web-service
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-mngt-db
          property: connectionString
      - key: NODE_ENV
        value: production

